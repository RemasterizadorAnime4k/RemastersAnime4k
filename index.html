    <meta property="og:title" content="Remastersanime4k">

    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --color1: #ffcccc;
            --color2: #ccffff;
            --color3: #ffd9cc;
            --color4: #ccfffc;
        }
        
		html {
            scroll-behavior: smooth;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

		body {
			background: linear-gradient(135deg, var(--color1), var(--color2), var(--color3), var(--color4));
			background-size: 400% 400%;
			animation: gradientFlow 20s ease infinite;
			font-family: 'Comic Neue', cursive;
			margin: 0;
			padding: 20px; /* Mantener el padding original */
			min-height: 100vh;
		}

		.navbar {
			backdrop-filter: blur(10px);
			background: var(--glass-bg);
			border-radius: 15px;
			padding: 0.8rem 2rem;
			margin-bottom: 2rem;
			box-shadow: 8px 8px 16px #d1d1d1, -8px -8px 16px #ffffff;
			display: flex;
			align-items: center;
			gap: 2rem;
			flex-wrap: wrap;
			position: sticky;
			top: 20px; /* Ajustar según el padding del body */
			z-index: 100;
		}

        .site-title {
            color: #2d3436;
            font-size: 1.8rem;
            margin: 0;
            text-decoration: none;
            cursor: default;
            user-select: none;
        }

        .nav-links {
            display: flex;
            gap: 1.2rem;
            flex-grow: 1;
            justify-content: center;
            margin: 0;
            padding: 0;
			transition: all 0.3s ease;
        }

        .nav-links a {
            color: #2d3436;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .nav-links a.active {
            background: var(--primary-color);
            color: white !important;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 3px 3px 6px #d1d1d1, -3px -3px 6px #ffffff;
        }

        .search-container {
            position: relative;
            max-width: 400px;
            width: 100%;
            flex-grow: 1;
            min-width: 200px;
        }

        .search-input {
            width: 100%;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            box-shadow: inset 3px 3px 6px #d1d1d1, inset -3px -3px 6px #ffffff;
            font-family: 'Comic Neue', cursive;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            box-shadow: inset 5px 5px 10px #d1d1d1, inset -5px -5px 10px #ffffff;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            padding: 2rem;
			margin-bottom: 80px; /* Espacio para el botón de scroll */
        }

        .anime-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1rem;
            border: 2px solid #fff;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(0);
			text-decoration: none !important;
			color: inherit !important;
        }

        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: 8px 8px 16px #d1d1d1, -8px -8px 16px #ffffff;
        }

        .anime-image {
            width: 100%;
            height: 300px;
            border-radius: 15px;
            object-fit: cover;
            border: 3px solid white;
            transition: transform 0.3s ease;
        }

        .anime-card:hover .anime-image {
            transform: scale(1.02);
        }

        .category-bubbles {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            max-width: 80%;
            z-index: 1;
        }

        .category-bubble {
            background: white;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.7rem;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .category-bubble:hover {
            transform: translateY(-2px);
            box-shadow: 3px 3px 6px rgba(0,0,0,0.1);
        }

        .anime-title {
            color: #2d3436;
            text-align: center;
            margin: 1rem 0;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            transition: padding 0.3s ease;
        }

        .anime-description {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 1rem;
            border-radius: 5px 5px 15px 15px;
            margin-top: 1rem;
            border-top: 2px solid white;
            font-family: 'Roboto', sans-serif;
            color: #2d3436;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary-color);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0;
            transition: all 0.3s ease, opacity 0.3s;
            z-index: 1000;
        }
		
        .back-to-top.show {
            visibility: visible;
            transform: translateY(0);
        }		

        .back-to-top:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .favorite-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-size: 1.5rem;
            color: #ff6b6b;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .favorite-icon:hover {
            transform: scale(1.2);
        }

        .favorite-icon.active {
            color: #ff0000;
            transform: scale(1.3);
            animation: pulse 0.5s ease;
        }

        .loading {
            display: none;
            text-align: center;
            font-size: 1.2rem;
            margin: 2rem 0;
        }

        .no-results {
            text-align: center;
            font-size: 1.5rem;
            color: #2d3436;
            width: 100%;
            margin-top: 2rem;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #2d3436;
            padding: 0.5rem;
            transition: transform 0.3s ease;
        }

        /* Estilos para banners publicitarios */
        .asd-container {
            grid-column: 1 / -1;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 2px solid #fff;
            border-radius: 20px;
            padding: 1.5rem;
            margin: 2rem 0;
            position: relative;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            box-shadow: 8px 8px 16px #d1d1d1, -8px -8px 16px #ffffff;
            transition: transform 0.3s ease;
            cursor: pointer;
            z-index: 1;
        }

        .asd-container:hover {
            transform: translateY(-3px);
        }

        .asd-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary-color);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.7rem;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            z-index: 2;
        }

        .asd-image {
            width: 250px;
            height: 150px;
            border-radius: 15px;
            object-fit: cover;
            border: 3px solid white;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .asd-image:hover {
            transform: scale(1.02);
        }

        .asd-content {
            flex-grow: 1;
        }

        .asd-title {
            font-family: 'Comic Neue', cursive;
            color: #2d3436;
            margin: 0 0 1rem 0;
            font-size: 1.4rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .asd-description {
            font-family: 'Roboto', sans-serif;
            color: #2d3436;
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .asd-cta {
            display: inline-block;
            background: var(--primary-color);
            color: white !important;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            text-decoration: none;
            font-family: 'Comic Neue', cursive;
            transition: all 0.3s ease;
            border: 2px solid white;
        }

        .asd-cta:hover {
            transform: translateY(-2px);
            box-shadow: 3px 3px 6px rgba(0,0,0,0.2);
        }

        @media (max-width: 768px) {
		
            body {
				padding: 10px;
                padding-bottom: 50px; /* Evita que el menú quede pegado al fondo */
            }
			
            .navbar {
				gap: 1rem;
                padding: 1rem;
				position: sticky;
				top: 20px;
				z-index: 1000;
				overflow: visible;
				transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            }
			
			.nav-hidden {
				box-shadow: none !important;
				transform: translateY(-150%) !important;
				transition-duration: 0.3s;
			}
            
			.nav-links {
				position: sticky;
				left: 0;
				right: 0;
				background: var(--glass-bg);
				backdrop-filter: blur(15px);
				margin: 10px;
				display: none; /* Ocultar inicialmente */
				opacity: 1; /* Mantener opacidad completa */
				transform: none;
				transition: none;
				max-height: none;
				z-index: 1001; /* Mayor que el navbar */
				border: 2px solid rgba(255, 255, 255, 0.3); /* Borde luminoso */
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); /* Sombra más pronunciada */
				padding: 1.5rem; /* Más espacio interno */
				gap: 1rem; /* Espacio entre links */
			}

			.nav-links.active {
				display: flex; /* Mostrar cuando está activo */
				flex-direction: column;
				animation: slideDown 0.3s ease-out;
				background: rgba(255, 255, 255, 0.15);
				border-radius: 12px;
				backdrop-filter: blur(15px);
				position: sticky;
			}
			
			@keyframes slideDown {
				from {
					transform: translateY(-10px);
					opacity: 0;
				}
				to {
					transform: translateY(0);
					opacity: 1;
				}
			}
            
			.menu-toggle {
				order: 1; /* Posicionar a la derecha */
				margin-left: auto;
				background: rgba(255, 255, 255, 0.2);
				border-radius: 50%;
				width: 40px;
				height: 40px;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			
			.menu-toggle:hover {
				background: rgba(255, 255, 255, 0.2);
				box-shadow: 0 0 10px rgba(0,0,0,0.1);
			}

			.menu-toggle.active {
				transform: rotate(90deg) scale(1.1);
			}
			
			.navbar.active {
				box-shadow: 0 4px 15px rgba(0,0,0,0.2);
				border-radius: 20px;
            }

            .search-input {
				width: auto;
                font-size: 1.1rem;
                padding: 0.9rem 1.3rem;
            }
			
            .search-container {
                order: 2;
                width: 100%;
                min-width: auto;
            }
            
            .nav-links a {
                justify-content: center;
                padding: 0.8rem;
            }
            
            .anime-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding: 1rem;
            }

            .anime-card {
                border-radius: 15px;
                padding: 0.8rem;
                transition: none;
            }
            
            .anime-card:active {
                transform: scale(0.98);
            }
			
            .anime-image {
                height: 250px;
            }
			
            .favorite-icon {
                font-size: 1.3rem;
            }
            
            .favorite-icon:active {
                transform: scale(1.3);
            }
			
            .category-bubble {
                font-size: 0.8rem;
                padding: 0.2rem 0.6rem;
            }

            .asd-container {
                flex-direction: column;
                text-align: center;
                padding: 1rem;
            }

            .asd-image {
                width: 100%;
                height: 200px;
            }

            .asd-badge {
                position: static;
                margin-bottom: 1rem;
                width: fit-content;
                margin-left: auto;
                margin-right: auto;
            }
			
			.back-to-top {
                width: 45px;
                height: 45px;
                bottom: 20px;
                right: 20px;
            }
        }
		
        /* Mejoras para tablets */
        @media (min-width: 769px) and (max-width: 1024px) {
            .anime-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.8rem;
                padding: 1.5rem;
            }

            .nav-links {
                gap: 1.5rem;
            }

            .anime-image {
                height: 320px;
            }

            .search-container {
                max-width: 350px;
            }

            .category-bubbles {
                gap: 8px;
            }
        }

		@media (hover: hover) {
            body {
                scroll-snap-type: y proximity;
            }
            
            .anime-card {
                scroll-snap-align: start;
            }
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1.3); }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

		let currentCategory = 'home';
		let searchTerm = '';

		function toggleFavorite(title) {
			const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
			const index = favorites.indexOf(title);
			favorites.splice(index, index === -1 ? 0 : 1, ...(index === -1 ? [title] : []));
			localStorage.setItem('favorites', JSON.stringify(favorites));
			updateFavoriteIcons();
		}

		function updateFavoriteIcons() {
			const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
			document.querySelectorAll('.favorite-icon').forEach(icon => {
				const title = icon.closest('.anime-card').querySelector('.anime-title').textContent;
				icon.classList.toggle('active', favorites.includes(title));
			});
		}

		function generateCards(data) {
			const grid = document.querySelector('.anime-grid');
			grid.innerHTML = data.map((item, index) => `
				${(index % 18 === 0 && index !== 0) ? `
					<div class="asd-container" data-url="https://es.pikbest.com/templates/food-menu-delicious-burger-instagram-social-media-advertising-banner-ad-post-design_8970422.html">
						<div class="asd-badge">PUBLICIDAD</div>
						<img src="https://img.pikbest.com/origin/08/97/04/22MpIkbEsTia2.jpg!w700wp" 
							 class="asd-image" 
							 alt="Publicidad"
							 loading="lazy">
						<div class="asd-content">
							<h3 class="asd-title">¡Tienda Oficial de Anime!</h3>
							<p class="asd-description">Consigue productos exclusivos y ediciones coleccionables ✨</p>
							<a href="https://es.pikbest.com/templates/food-menu-delicious-burger-instagram-social-media-advertising-banner-ad-post-design_8970422.html" class="asd-cta">Ver Ofertas</a>
						</div>
					</div>` : ''}
				<div class="anime-card" data-link="${item.url}">
					<div class="favorite-icon" onclick="toggleFavorite('${item.title.replace(/'/g, "\\'")}')">♥</div>
					<div class="category-bubbles">
						${item.categories.map(cat => `<div class="category-bubble">${cat.toUpperCase()}</div>`).join('')}
					</div>
					<img src="${item.image}" 
						 alt="Portada de ${item.title}" 
						 class="anime-image"
						 loading="lazy"
						 onerror="this.src='https://via.placeholder.com/300x400?text=Imagen+no+disponible'">
					<h3 class="anime-title">${item.title}</h3>
					<div class="anime-description">
						<p class="description-content">${item.description}</p>
					</div>
				</div>
			`).join('');

			document.querySelectorAll('.asd-container').forEach(ad => {
				ad.addEventListener('click', (e) => {
					if(!e.target.classList.contains('ad-cta')) {
						window.open(ad.dataset.url, '_blank');
					}
				});
			});
		}

		function filterCards() {
			const filteredData = animeData.filter(item => 
				(currentCategory === 'home' || item.categories.includes(currentCategory)) &&
				item.title.toLowerCase().includes(searchTerm.toLowerCase())
			);

			document.querySelector('.loading').style.display = 'block';
			setTimeout(() => {
				generateCards(filteredData);
				document.querySelector('.loading').style.display = 'none';
				updateNoResultsMessage(filteredData);
				updateFavoriteIcons();
				setupIntersectionObserver();
			}, 300);
		}

		function updateNoResultsMessage(data) {
			const existingMessage = document.querySelector('.no-results');
			if(data.length === 0 && !existingMessage) {
				document.querySelector('.anime-grid').insertAdjacentHTML('afterend', 
					`<p class="no-results">🔍 No se encontraron resultados para "${searchTerm}"</p>`);
			} else if(data.length > 0 && existingMessage) {
				existingMessage.remove();
			}
		}

		function setupIntersectionObserver() {
			const observer = new IntersectionObserver(entries => {
				entries.forEach(entry => {
					if(entry.isIntersecting) {
						entry.target.style.opacity = 1;
						entry.target.style.transform = 'translateY(0)';
						observer.unobserve(entry.target);
					}
				});
			}, { rootMargin: '0px 0px -100px 0px', threshold: 0.1 });

			document.querySelectorAll('.anime-card').forEach(card => {
				card.style.opacity = 0;
				card.style.transform = 'translateY(20px)';
				observer.observe(card);
			});
		}

		// Event Listeners
		document.querySelectorAll('.nav-links a').forEach(link => {
			link.addEventListener('click', (e) => {
				e.preventDefault();
				currentCategory = link.getAttribute('href').slice(1);
				document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
				link.classList.add('active');
				document.querySelector('.nav-links').classList.remove('active');
				document.querySelector('.menu-toggle').textContent = '☰';
				filterCards();
			});
		});

		document.querySelector('.search-input').addEventListener('input', (e) => {
			searchTerm = e.target.value;
			filterCards();
		});

		document.querySelector('.menu-toggle').addEventListener('click', (e) => {
			e.stopPropagation();
			const navLinks = document.querySelector('.nav-links');
			navLinks.classList.toggle('active');
			document.querySelector('.menu-toggle').textContent = 
				navLinks.classList.contains('active') ? '×' : '☰';
		});
		
		document.addEventListener('click', (e) => {
			if (!e.target.closest('.navbar')) {
				document.querySelector('.nav-links').classList.remove('active');
				document.querySelector('.menu-toggle').textContent = '☰';
			}
		});
		
		window.addEventListener('scroll', () => {
			const navLinks = document.querySelector('.nav-links');
			if (navLinks.classList.contains('active')) {
				navLinks.classList.remove('active');
				document.querySelector('.menu-toggle').textContent = '☰';
			}
		});

		document.querySelector('.back-to-top').addEventListener('click', () => {
			window.scrollTo({ top: 0, behavior: 'smooth' });
		});
		
		class MobileNavigation {
			constructor() {
				this.lastScroll = 0;
				this.navbar = document.querySelector('.navbar');
				this.isMobile = window.innerWidth <= 768;
				this.throttleTimeout = null;
				
				this.addEventListeners();
			}

			addEventListeners() {
				window.addEventListener('scroll', () => this.handleScroll(), { passive: true });
				window.addEventListener('resize', () => this.handleResize());
			}

			handleScroll() {
				if (!this.isMobile) return;
				
				// Throttle para mejor rendimiento
				if (!this.throttleTimeout) {
					this.throttleTimeout = setTimeout(() => {
						const currentScroll = window.pageYOffset;
						const scrollDown = currentScroll > 100 && currentScroll > this.lastScroll;
						
						this.navbar.classList.toggle('nav-hidden', scrollDown);
						this.lastScroll = currentScroll;
						this.throttleTimeout = null;
					}, 100);
				}
			}

			handleResize() {
				this.isMobile = window.innerWidth <= 768;
				if (!this.isMobile) {
					this.navbar.classList.remove('nav-hidden');
				}
			}
		}

		window.addEventListener('scroll', () => {
			const button = document.querySelector('.back-to-top');
			button.style.opacity = window.scrollY > 500 ? 1 : 0;
			
			if(window.innerWidth <= 1024) {
				document.querySelectorAll('.anime-card:not(.loaded)').forEach(card => {
					const rect = card.getBoundingClientRect();
					if(rect.top < window.innerHeight * 1.2) {
						card.style.opacity = 1;
						card.style.transform = 'translateY(0)';
						card.classList.add('loaded');
					}
				});
			}
		});

		document.querySelector('.anime-grid').addEventListener('click', (e) => {
			const card = e.target.closest('.anime-card');
			if(card && !e.target.classList.contains('favorite-icon')) {
				window.open(card.dataset.link, '_blank');
			}
		});

		// Inicialización
		document.addEventListener('DOMContentLoaded', () => {
			const savedCategory = localStorage.getItem('selectedCategory') || 'home';
			currentCategory = savedCategory;
			const activeLink = document.querySelector(`.nav-links a[href="#${savedCategory}"]`);
			activeLink?.classList.add('active');
			
			new MobileNavigation();
			filterCards();
			updateFavoriteIcons();
		});	
	</script>
